<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome Folder</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #c9d7ea 0%, #8fb7de 47%, #3f86c7 100%);
        color: #10243d;
      }

      main {
        width: min(92vw, 540px);
        padding: 1.3rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(31, 73, 115, 0.35);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      img {
        width: 34px;
        height: 34px;
      }

      a {
        color: #123d67;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="row">
        <img src="Source/chrome3.ico" alt="" aria-hidden="true" />
        <h1>Chrome Folder</h1>
      </div>
      <p>This is a basic placeholder page for the Chrome folder.</p>
      <p><a href="index.html">Back to index</a></p>
    </main>
  </body>
</html>

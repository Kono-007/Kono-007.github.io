<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows Desktop</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .windows-body {
        background-color: #0d4f9e;
        background-image: url("Source/windows_7_202.jpg");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
      }

      .windows-screen {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .desktop-icons {
        position: absolute;
        left: 8px;
        top: 14px;
        display: grid;
        gap: 10px;
        z-index: 120;
      }

      .desktop-app {
        width: 92px;
        border: none;
        background: transparent;
        color: #eef7ff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
        font: inherit;
        font-size: 0.8rem;
        display: grid;
        justify-items: center;
        gap: 0.34rem;
        cursor: pointer;
      }

      .desktop-app .desktop-icon {
        width: 52px;
        height: 52px;
        background-repeat: no-repeat;
        background-size: contain;
        background-position: center;
        filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.45));
      }

      .desktop-icon.chrome {
        background-image: url("Source/chrome3.ico");
      }

      .desktop-icon.spotify {
        background-image: url("Source/spotify2.ico");
      }

      .desktop-icon.movie {
        background-image: url("Source/vista_movie.ico");
      }

      .taskbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 48px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        box-sizing: border-box;
        background: linear-gradient(180deg, rgba(120, 193, 238, 0.85) 0%, rgba(45, 126, 199, 0.92) 50%, rgba(16, 86, 171, 0.95) 100%);
        border-top: 1px solid rgba(209, 240, 255, 0.7);
        box-shadow: 0 -1px 0 rgba(0, 28, 68, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(2px);
        z-index: 1000;
      }

      .start-button {
        width: 56px;
        height: 44px;
        border: none;
        border-radius: 8px;
        padding: 0;
        display: grid;
        place-items: center;
        background: transparent;
        cursor: pointer;
      }

      .start-logo {
        width: 40px;
        height: 40px;
        object-fit: contain;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.35));
      }

      .task-icons {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .task-button {
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 6px;
        background: transparent;
        padding: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .task-button:hover,
      .start-button:hover {
        background-color: rgba(255, 255, 255, 0.14);
      }

      .task-icon {
        width: 25px;
        height: 25px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: 25px 25px;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      }

      .task-icon.chrome {
        background-image: url("Source/chrome3.ico");
      }

      .task-icon.spotify {
        background-image: url("Source/spotify2.ico");
      }

      .task-icon.movie {
        background-image: url("Source/vista_movie.ico");
      }

      .clock {
        padding: 0 10px;
        height: 30px;
        border: 1px solid rgba(176, 226, 255, 0.55);
        border-radius: 4px;
        display: grid;
        place-items: center;
        color: #f2fbff;
        font-size: 0.82rem;
        background: linear-gradient(180deg, rgba(102, 179, 237, 0.75) 0%, rgba(33, 113, 186, 0.85) 100%);
      }

      .window-layer {
        position: fixed;
        inset: 0 0 48px 0;
        z-index: 900;
        pointer-events: none;
      }

      .app-window {
        position: absolute;
        width: min(620px, calc(100vw - 24px));
        min-height: 340px;
        border-radius: 8px;
        border: 1px solid rgba(38, 77, 124, 0.9);
        background: rgba(242, 248, 255, 0.62);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow: 0 14px 34px rgba(5, 31, 56, 0.45);
        overflow: hidden;
        pointer-events: auto;
      }

      .app-window.start-menu-window {
        width: min(380px, calc(100vw - 16px));
        height: auto;
        border-radius: 10px 10px 0 0;
        border-bottom: none;
        background: rgba(32, 87, 146, 0.6);
        bottom: 0 !important;
        top: auto !important;
      }

      .app-window.start-menu-window.is-opening {
        animation: start-menu-slide-up 210ms ease-out;
      }

      .app-window.start-menu-window.is-closing {
        animation: start-menu-slide-down 180ms ease-in forwards;
      }

      .window-titlebar {
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px 0 10px;
        color: #eff8ff;
        font-size: 0.86rem;
        font-weight: 600;
        background: linear-gradient(180deg, #4e9be0 0%, #2d78bf 65%, #2569aa 100%);
        cursor: move;
        user-select: none;
      }

      .window-title-meta {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 0;
      }

      .window-title-icon {
        width: 16px;
        height: 16px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
        flex: 0 0 16px;
      }

      .window-title-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .window-close {
        width: 24px;
        height: 22px;
        border: 1px solid rgba(125, 21, 21, 0.75);
        border-radius: 3px;
        color: #fff;
        font-size: 0.9rem;
        line-height: 1;
        background: linear-gradient(180deg, #ef7878 0%, #c93b3b 100%);
        cursor: pointer;
      }

      .window-content {
        padding: 1.1rem;
        color: #0c3156;
        font-size: 0.98rem;
        min-height: 280px;
      }

      .window-content h2 {
        margin: 0 0 0.55rem;
        font-size: 1.2rem;
      }

      .window-content p {
        margin: 0;
      }

      .window-content.windows-theme {
        color: #eef7ff;
        background: linear-gradient(155deg, rgba(30, 84, 141, 0.85) 0%, rgba(19, 50, 87, 0.78) 100%);
      }

      .start-menu {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.9rem;
      }

      .start-col {
        border-radius: 9px;
        padding: 0.7rem;
        background: rgba(255, 255, 255, 0.14);
      }

      .start-col h3 {
        margin: 0 0 0.6rem;
        font-size: 0.95rem;
      }

      .start-app-item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .start-app-icon {
        width: 16px;
        height: 16px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: 16px 16px;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      }

      .start-app-icon.chrome {
        background-image: url("Source/chrome3.ico");
      }

      .start-app-icon.spotify {
        background-image: url("Source/spotify2.ico");
      }

      .start-app-icon.letterboxd {
        background-image: url("Source/vista_movie.ico");
      }

      .start-app-icon.viewer {
        background-image: url("Source/App022.ico");
      }

      .start-app-launch {
        cursor: pointer;
        user-select: none;
      }

      .start-app-launch:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .start-app-launch:focus-visible {
        outline: 2px solid rgba(201, 232, 255, 0.9);
        outline-offset: 1px;
      }

      .viewer-frame {
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(209, 229, 249, 0.2);
      }

      .viewer-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .viewer-controls {
        margin-top: 0.55rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.45rem;
      }

      .viewer-button {
        min-width: 32px;
        height: 28px;
        border: 1px solid rgba(193, 224, 255, 0.4);
        border-radius: 6px;
        color: #e8f5ff;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }

      .viewer-count {
        font-size: 0.78rem;
      }

      .window-content.viewer-theme {
        color: #eef7ff;
        background: linear-gradient(145deg, rgba(39, 91, 149, 0.86) 0%, rgba(20, 50, 91, 0.8) 100%);
      }

      .viewer-shell h2 {
        margin: 0 0 0.7rem;
      }

      .viewer-shell .viewer-frame {
        min-height: 300px;
      }

      .start-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.45rem;
      }

      .start-list li {
        padding: 0.45rem 0.55rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1);
      }

      .window-content.chrome-theme {
        color: #1b2f44;
        background: linear-gradient(180deg, rgba(239, 246, 255, 0.42) 0%, rgba(214, 228, 246, 0.34) 100%);
      }

      .app-window.chrome-window {
        height: min(440px, calc(100vh - 92px));
      }

      .app-window.chrome-window .window-content.chrome-theme {
        min-height: 0;
        height: calc(100% - 34px);
        padding: 0.85rem;
        display: flex;
      }

      .chrome-shell {
        border: 1px solid rgba(156, 178, 204, 0.82);
        border-radius: 11px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(5px);
        display: flex;
        flex-direction: column;
        min-height: 0;
        width: 100%;
      }

      .chrome-topbar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.65rem;
        background: linear-gradient(180deg, rgba(244, 248, 254, 0.65) 0%, rgba(215, 227, 243, 0.56) 100%);
        border-bottom: 1px solid rgba(167, 185, 206, 0.7);
      }

      .chrome-address-form {
        flex: 1;
      }

      .chrome-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: #9db5d2;
      }

      .chrome-address {
        width: 100%;
        box-sizing: border-box;
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-size: 0.82rem;
        color: #344f6b;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(167, 185, 206, 0.72);
        outline: none;
      }

      .chrome-address:focus {
        border-color: rgba(85, 138, 195, 0.9);
        box-shadow: 0 0 0 2px rgba(125, 174, 228, 0.32);
      }

      .chrome-card {
        border-radius: 10px;
        padding: 0.9rem;
        background: transparent;
        border: none;
      }

      .chrome-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0.2rem 0.2rem 0.7rem;
        display: grid;
        gap: 0.55rem;
      }

      .chrome-sites {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .chrome-sites a {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.55rem 0.65rem;
        border-radius: 7px;
        text-decoration: none;
        color: #143357;
        background: rgba(255, 255, 255, 0.24);
        border: 1px solid rgba(177, 198, 220, 0.48);
      }

      .site-logo {
        width: 16px;
        height: 16px;
        flex: 0 0 16px;
      }

      .window-content.spotify-theme {
        color: #dfffe8;
        background: linear-gradient(145deg, rgba(19, 38, 27, 0.8) 0%, rgba(14, 23, 20, 0.74) 100%);
      }

      .spotify-header {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.9rem;
      }

      .spotify-logo {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      .spotify-profile-card {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin: 0 0 0.8rem;
        padding: 0.45rem 0.55rem;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .spotify-profile-photo {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        object-fit: cover;
      }

      .spotify-profile-link,
      .lb-profile-link {
        color: #8effb1;
        text-decoration: underline;
      }

      .spotify-embed-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.65rem;
        margin-top: 0.8rem;
      }

      .spotify-embed-grid iframe {
        width: 100%;
        height: 152px;
        border: 0;
        border-radius: 10px;
      }

      .window-content.letterboxd-theme {
        color: #eef2f7;
        background: linear-gradient(145deg, rgba(22, 27, 33, 0.8) 0%, rgba(11, 14, 19, 0.74) 100%);
      }

      .lb-header {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.9rem;
      }

      .lb-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
      }

      .lb-dot.orange {
        background-color: #f47b20;
      }

      .lb-dot.green {
        background-color: #43c86f;
      }

      .lb-dot.blue {
        background-color: #00a6dc;
      }

      .lb-profile {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin: 0 0 0.9rem;
      }

      .lb-profile-photo {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
      }

      .lb-meta {
        margin: 0 0 0.65rem;
      }

      .lb-poster-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
      }

      .lb-poster {
        aspect-ratio: 2 / 3;
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(60, 70, 85, 0.9) 0%, rgba(28, 34, 43, 0.95) 100%);
        border: 1px solid rgba(132, 146, 170, 0.35);
        overflow: hidden;
      }

      .lb-poster-grid img {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
        display: block;
      }

      .lb-empty {
        margin: 0;
        color: #c6d2df;
      }

      @keyframes start-menu-slide-up {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes start-menu-slide-down {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(24px);
        }
      }

      @media (max-width: 800px) {
        .spotify-embed-grid,
        .chrome-sites {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="windows-body">
    <div class="windows-screen">
      <div class="desktop-icons" aria-label="Desktop apps">
        <button id="desktopChrome" class="desktop-app" type="button" aria-label="Open Chrome">
          <span class="desktop-icon chrome" aria-hidden="true"></span>
          <span>Chrome</span>
        </button>
        <button id="desktopSpotify" class="desktop-app" type="button" aria-label="Open Spotify">
          <span class="desktop-icon spotify" aria-hidden="true"></span>
          <span>Spotify</span>
        </button>
        <button id="desktopMovie" class="desktop-app" type="button" aria-label="Open Letterboxd">
          <span class="desktop-icon movie" aria-hidden="true"></span>
          <span>Letterboxd</span>
        </button>
      </div>

      <div id="windowLayer" class="window-layer" aria-live="polite"></div>

      <footer class="taskbar" aria-label="Windows 7 style taskbar">
        <button id="appWindows" class="start-button" type="button" aria-label="Windows app">
          <img class="start-logo" src="Source/App004.ico" alt="" aria-hidden="true" />
        </button>
        <div class="task-icons">
          <button id="appChrome" class="task-button" type="button" aria-label="Chrome app">
            <span class="task-icon chrome" aria-hidden="true"></span>
          </button>
          <button id="appSpotify" class="task-button" type="button" aria-label="Spotify app">
            <span class="task-icon spotify" aria-hidden="true"></span>
          </button>
          <button id="appMovie" class="task-button" type="button" aria-label="Movie app">
            <span class="task-icon movie" aria-hidden="true"></span>
          </button>
        </div>
        <div id="clock" class="clock" style="margin-left: auto;"></div>
      </footer>
    </div>

        "jumpc_thor009010.jpg","jumpc_thor010011.jpg","jumpc_thor011012.jpg","jumpc_thor013014.jpg","jumpc_thor014015.jpg","jumpc_thor015016.jpg","jumpc_thor021022.jpg","jumpc_thor022023.jpg","jumpc_thor023024.jpg","jumpc_thor026027.jpg","jumpc_thor027028.jpg","jumpc_thor028029.jpg","jumpc_thor030031.jpg","jumpc_thor031032.jpg","jumpc_thor033034.jpg","jumpc_thor034035.jpg","jumpc_thor035036.jpg","jumpc_thor036037.jpg","jumpc_thor037038.jpg","jumpc_thor038039.jpg","jumpc_thor039040.jpg","jumpc_thor040041.jpg","jumpc_thor041042.jpg","jumpc_thor043044.jpg","jumpc_thor044045.jpg","jumpc_thor045046.jpg","jumpc_thor046047.jpg","jumpc_thor047048.jpg","jumpc_thor048049.jpg","jumpc_thor049050.jpg","jumpc_thor050051.jpg","jumpc_thor051052.jpg","jumpc_thor056057.jpg","jumpc_thor057058.jpg","jumpc_thor058059.jpg","jumpc_thor059060.jpg","jumpc_thor060061.jpg","jumpc_thor061062.jpg","jumpc_thor062063.jpg","jumpc_thor064065.jpg","jumpc_thor065066.jpg","jumpc_thor066067.jpg","jumpc_thor067068.jpg","jumpc_thor068069.jpg","jumpc_thor069070.jpg","jumpc_thor070071.jpg","jumpc_thor071072.jpg","jumpc_thor076077.jpg","jumpc_thor077078.jpg","jumpc_thor078079.jpg","jumpc_thor079080.jpg","jumpc_thor080081.jpg","jumpc_thor081082.jpg","jumpc_thor082083.jpg","jumpc_thor083084.jpg","jumpc_thor084085.jpg","jumpc_thor085086.jpg","jumpc_thor086087.jpg","jumpc_thor087088.jpg","jumpc_thor088089.jpg","jumpc_thor089090.jpg","jumpc_thor090091.jpg","merged (1).jpg","merged (2).jpg","merged (3).jpg","merged (4).jpg","merged.jpg",
      ];

      const galleryImages = galleryFileNames.map(function (fileName) {
        return "Source/gallery/" + encodeURIComponent(fileName);
      });

      function getWindowsHtml() {
        return '<div class="start-menu"><div class="start-col"><h3>Pinned</h3><ul class="start-list"><li class="start-app-item"><span class="start-app-icon chrome" aria-hidden="true"></span><span>Google Chrome</span></li><li class="start-app-item"><span class="start-app-icon spotify" aria-hidden="true"></span><span>Spotify</span></li><li class="start-app-item"><span class="start-app-icon letterboxd" aria-hidden="true"></span><span>Letterboxd</span></li><li class="start-app-item start-app-launch" data-open-viewer role="button" tabindex="0" aria-label="Open Windows Photo Viewer"><span class="start-app-icon viewer" aria-hidden="true"></span><span>Windows Photo Viewer</span></li><li class="start-app-item start-app-launch" data-logout role="button" tabindex="0" aria-label="Log out"><span style="width:16px;height:16px;background-image:url(\'Source/Net004.ico\');background-size:16px;background-repeat:no-repeat;display:inline-block;" aria-hidden="true"></span><span>Log Out</span></li></ul></div></div>';
      }

      function getViewerHtml() {
        return '<div class="viewer-shell"><div class="viewer-frame"><img class="viewer-image" data-gallery-image src="" alt="Gallery image" /></div><div class="viewer-controls"><button class="viewer-button" type="button" data-gallery-prev aria-label="Previous image">◀</button><span class="viewer-count" data-gallery-count>1 / 1</span><button class="viewer-button" type="button" data-gallery-next aria-label="Next image">▶</button></div></div>';
      }

      function getChromeHtml() {
        const featuredItems = featuredSites
          .map(function (site) {
            return '<li><a href="' + site[1] + '" target="_blank" rel="noopener noreferrer"><img class="site-logo" src="' + site[2] + '" alt="" aria-hidden="true" />' + site[0] + "</a></li>";
          })
          .join("");

        const siteItems = designSites
          .map(function (site) {
            return '<li><a href="' + site[1] + '" target="_blank" rel="noopener noreferrer"><img class="site-logo" src="' + site[2] + '" alt="" aria-hidden="true" />' + site[0] + "</a></li>";
          })
          .join("");

        return '<div class="chrome-shell"><div class="chrome-topbar"><span class="chrome-dot"></span><span class="chrome-dot"></span><span class="chrome-dot"></span><form class="chrome-address-form" data-chrome-url-form><input class="chrome-address" type="text" placeholder="Type a URL and press Enter" autocomplete="off" /></form></div><div class="chrome-scroll"><div class="chrome-card"><h2>Featured</h2><ul class="chrome-sites">' + featuredItems + '</ul></div><div class="chrome-card"><h2>Diseño</h2><ul class="chrome-sites">' + siteItems + "</ul></div></div></div>";
      }

      function getSpotifyHtml() {
        const embeds = spotifyAlbums
          .map(function (albumId) {
            return '<iframe src="https://open.spotify.com/embed/album/' + albumId + '?utm_source=generator" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
          })
          .join("");

        return '<div class="spotify-header"><img class="spotify-logo" src="Source/spotify2.ico" alt="" aria-hidden="true" /><h2>Spotify</h2></div><div class="spotify-profile-card"><img class="spotify-profile-photo" src="Source/spotify%20pfp.jpg" alt="Spotify profile" /><a class="spotify-profile-link" href="https://open.spotify.com/user/mamakosai?si=6f35ae2dec744364" target="_blank" rel="noopener noreferrer">Kono profile</a></div><div class="spotify-embed-grid">' + embeds + "</div>";
      }

      function getLetterboxdHtml() {
        return '<div class="lb-header"><span class="lb-dot orange"></span><span class="lb-dot green"></span><span class="lb-dot blue"></span><h2>Letterboxd</h2></div><div class="lb-profile"><img class="lb-profile-photo" src="Source/spotify%20pfp.jpg" alt="Letterboxd profile" /><div><p class="lb-meta">@mamakosaitam</p><a class="lb-profile-link" href="https://letterboxd.com/mamakosaitam/" target="_blank" rel="noopener noreferrer">Open profile on Letterboxd</a></div></div><div class="lb-poster-grid" data-lb-feed><p class="lb-empty">Loading recent films...</p></div>';
      }

      const appDefinitions = {
        windows: { title: "Windows", contentClass: "windows-theme", html: getWindowsHtml, startMenu: true },
        viewer: { title: "Windows Photo Viewer", contentClass: "viewer-theme", html: getViewerHtml, titleIcon: "Source/App022.ico" },
        chrome: { title: "Google Chrome", contentClass: "chrome-theme", html: getChromeHtml, windowClass: "chrome-window" },
        spotify: { title: "Spotify", contentClass: "spotify-theme", html: getSpotifyHtml },
        movie: { title: "Letterboxd", contentClass: "letterboxd-theme", html: getLetterboxdHtml },
      };

      function updateClock() {
        const now = new Date();
        clock.textContent = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
      }

      function bringToFront(winEl) {
        topZIndex += 1;
        winEl.style.zIndex = String(topZIndex);
      }

      function closeWindow(appId) {
        const existing = openWindows.get(appId);
        if (!existing) {
          return;
        }

        if (appId === "windows") {
          existing.classList.remove("is-opening");
          existing.classList.add("is-closing");
          setTimeout(function () {
            openWindows.delete(appId);
            existing.remove();
          }, 180);
          return;
        }

        openWindows.delete(appId);
        existing.remove();
      }

      function makeDraggable(winEl, titleBar) {
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let dragging = false;

        titleBar.addEventListener("mousedown", function (event) {
          dragging = true;
          bringToFront(winEl);
          const rect = winEl.getBoundingClientRect();
          dragOffsetX = event.clientX - rect.left;
          dragOffsetY = event.clientY - rect.top;
          event.preventDefault();
        });

        document.addEventListener("mousemove", function (event) {
          if (!dragging) {
            return;
          }

          const layerRect = windowLayer.getBoundingClientRect();
          let nextLeft = event.clientX - layerRect.left - dragOffsetX;
          let nextTop = event.clientY - layerRect.top - dragOffsetY;

          const maxLeft = Math.max(0, layerRect.width - winEl.offsetWidth);
          const maxTop = Math.max(0, layerRect.height - winEl.offsetHeight);

          nextLeft = Math.min(Math.max(0, nextLeft), maxLeft);
          nextTop = Math.min(Math.max(0, nextTop), maxTop);

          winEl.style.left = nextLeft + "px";
          winEl.style.top = nextTop + "px";
        });

        document.addEventListener("mouseup", function () {
          dragging = false;
        });
      }

      function loadLetterboxdFeed(winEl) {
        const grid = winEl.querySelector("[data-lb-feed]");
        if (!grid) {
          return;
        }

        const rssUrl = encodeURIComponent("https://letterboxd.com/mamakosaitam/rss/");
        const endpoint = "https://api.rss2json.com/v1/api.json?rss_url=" + rssUrl;

        fetch(endpoint)
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            if (!data || !Array.isArray(data.items) || data.items.length === 0) {
              throw new Error("No feed data");
            }

            const movies = data.items.slice(0, 6);
            grid.innerHTML = movies
              .map(function (item) {
                const title = item.title || "Film";
                const source = item.thumbnail || item.content || item.description || "";
                const match = String(source).match(/<img[^>]+src=\"([^\"]+)\"/i);
                const poster = item.thumbnail || (match ? match[1] : "");
                const link = item.link || "https://letterboxd.com/mamakosaitam/";

                if (!poster) {
                  return '<a class="lb-poster" href="' + link + '" target="_blank" rel="noopener noreferrer"></a>';
                }

                return '<a class="lb-poster" href="' + link + '" target="_blank" rel="noopener noreferrer"><img src="' + poster + '" alt="' + title.replace(/"/g, "") + ' poster" loading="lazy" referrerpolicy="no-referrer" /></a>';
              })
              .join("");
          })
          .catch(function () {
            grid.innerHTML = '<p class="lb-empty">Could not load films now.</p>';
          });
      }

      function wireChromeAddress(winEl) {
        const form = winEl.querySelector("[data-chrome-url-form]");
        if (!form) {
          return;
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          const input = form.querySelector(".chrome-address");
          if (!input) {
            return;
          }

          const rawValue = input.value.trim();
          if (!rawValue) {
            return;
          }

          const hasProtocol = /^https?:\/\//i.test(rawValue);
          const hasSpaces = /\s/.test(rawValue);
          const looksLikeDomain = /\.|localhost|^\d{1,3}(?:\.\d{1,3}){3}/i.test(rawValue);

          let targetUrl = "";
          if (hasProtocol) {
            targetUrl = rawValue;
          } else if (!hasSpaces && looksLikeDomain) {
            targetUrl = "https://" + rawValue;
          } else {
            targetUrl = "https://www.google.com/search?q=" + encodeURIComponent(rawValue);
          }

          window.open(targetUrl, "_blank", "noopener,noreferrer");
        });
      }

      function wireWindowsPhotoViewer(winEl) {
        const imageEl = winEl.querySelector("[data-gallery-image]");
        const countEl = winEl.querySelector("[data-gallery-count]");
        const prevBtn = winEl.querySelector("[data-gallery-prev]");
        const nextBtn = winEl.querySelector("[data-gallery-next]");

        if (!imageEl || !countEl || !prevBtn || !nextBtn) {
          return;
        }

        if (galleryImages.length === 0) {
          imageEl.removeAttribute("src");
          imageEl.alt = "No images found";
          countEl.textContent = "0 / 0";
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          return;
        }

        let galleryIndex = 0;

        function renderGalleryImage() {
          imageEl.src = galleryImages[galleryIndex];
          imageEl.alt = "Gallery image " + (galleryIndex + 1);
          countEl.textContent = String(galleryIndex + 1) + " / " + String(galleryImages.length);
        }

        function showNext() {
          galleryIndex = (galleryIndex + 1) % galleryImages.length;
          renderGalleryImage();
        }

        function showPrev() {
          galleryIndex = (galleryIndex - 1 + galleryImages.length) % galleryImages.length;
          renderGalleryImage();
        }

        prevBtn.addEventListener("click", showPrev);
        nextBtn.addEventListener("click", showNext);

        imageEl.addEventListener(
          "wheel",
          function (event) {
            event.preventDefault();
            if (event.deltaY > 0) {
              showNext();
            } else {
              showPrev();
            }
          },
          { passive: false }
        );

        renderGalleryImage();
      }

      function wireWindowsMenuActions(winEl) {
        const viewerLaunch = winEl.querySelector("[data-open-viewer]");
        if (viewerLaunch) {
          function openViewerFromMenu() {
            openOrFocus("viewer");
            closeWindow("windows");
          }

          viewerLaunch.addEventListener("click", function () {
            openViewerFromMenu();
          });

          viewerLaunch.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openViewerFromMenu();
            }
          });
        }

        const logoutBtn = winEl.querySelector("[data-logout]");
        if (logoutBtn) {
          function handleLogout() {
            window.location.href = "index.html";
          }

          logoutBtn.addEventListener("click", function () {
            handleLogout();
          });

          logoutBtn.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              handleLogout();
            }
          });
        }
      }

      function createWindow(appId) {
        const app = appDefinitions[appId];
        const winEl = document.createElement("article");
        winEl.className = "app-window";
        winEl.setAttribute("data-app-id", appId);

        const isWindowsMenu = Boolean(app.startMenu);
        if (isWindowsMenu) {
          winEl.classList.add("start-menu-window", "is-opening");
        }

        if (app.windowClass) {
          winEl.classList.add(app.windowClass);
        }

        const bodyHtml = typeof app.html === "function" ? app.html() : app.html;

        winEl.innerHTML =
          (isWindowsMenu
            ? ""
            : '<div class="window-titlebar"><div class="window-title-meta">' +
                (app.titleIcon ? '<span class="window-title-icon" style="background-image:url(\'' + app.titleIcon + '\')" aria-hidden="true"></span>' : "") +
                '<span class="window-title-text">' + app.title + '</span></div><button class="window-close" type="button" aria-label="Close">X</button></div>') +
          '<div class="window-content ' + app.contentClass + '">' + bodyHtml + "</div>";

        const layerRect = windowLayer.getBoundingClientRect();
        if (isWindowsMenu) {
          winEl.style.left = "8px";
          winEl.style.top = Math.max(8, layerRect.height - 448) + "px";
        } else {
          const left = Math.max(12, layerRect.width / 2 - 310 + openWindows.size * 22);
          const top = Math.max(12, layerRect.height / 2 - 210 + openWindows.size * 22);
          winEl.style.left = left + "px";
          winEl.style.top = top + "px";
        }

        const titleBar = winEl.querySelector(".window-titlebar");
        const closeBtn = winEl.querySelector(".window-close");

        if (closeBtn) {
          closeBtn.addEventListener("click", function () {
            closeWindow(appId);
          });
        }

        winEl.addEventListener("mousedown", function () {
          bringToFront(winEl);
        });

        if (titleBar) {
          makeDraggable(winEl, titleBar);
        }

        windowLayer.appendChild(winEl);
        openWindows.set(appId, winEl);
        bringToFront(winEl);

        if (isWindowsMenu) {
          setTimeout(function () {
            winEl.classList.remove("is-opening");
          }, 220);

          wireWindowsMenuActions(winEl);
        }

        if (appId === "movie") {
          loadLetterboxdFeed(winEl);
        }

        if (appId === "chrome") {
          wireChromeAddress(winEl);
        }

        if (appId === "viewer") {
          wireWindowsPhotoViewer(winEl);
        }
      }

      function openOrFocus(appId) {
        if (openWindows.has(appId)) {
          bringToFront(openWindows.get(appId));
          return;
        }

        createWindow(appId);
      }

      function bindAppButton(buttonId, appId) {
        const button = document.getElementById(buttonId);
        if (!button) {
          return;
        }

        button.addEventListener("click", function () {
          if (appId === "windows" && openWindows.has("windows")) {
            closeWindow("windows");
            return;
          }

          openOrFocus(appId);
        });
      }

      bindAppButton("appWindows", "windows");
      bindAppButton("appChrome", "chrome");
      bindAppButton("appSpotify", "spotify");
      bindAppButton("appMovie", "movie");
      bindAppButton("desktopChrome", "chrome");
      bindAppButton("desktopSpotify", "spotify");
      bindAppButton("desktopMovie", "movie");

      updateClock();
      setInterval(updateClock, 1000);
    </script>

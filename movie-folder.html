<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Folder</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #74849a 0%, #3f536a 52%, #1e2c3b 100%);
        color: #f3f7ff;
      }

      main {
        width: min(92vw, 540px);
        padding: 1.3rem;
        border-radius: 12px;
        background: rgba(20, 27, 36, 0.64);
        border: 1px solid rgba(203, 218, 238, 0.25);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      img {
        width: 34px;
        height: 34px;
      }

      a {
        color: #c9ddff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="row">
        <img src="Source/vista_movie.ico" alt="" aria-hidden="true" />
        <h1>Movie Folder</h1>
      </div>
      <p>This is a basic placeholder page for the Movie folder.</p>
      <p><a href="index.html">Back to index</a></p>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kono-007</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="desktop" aria-label="Desktop folder rename view">
      <section id="folderItem" class="folder-item">
        <img class="folder-logo" src="Source/Folder121.ico" alt="" aria-hidden="true" />
        <label class="sr-only" for="folderName">Folder name</label>
        <input id="folderName" class="folder-name" name="folderName" type="text" value="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
      </section>
    </main>

    <script>
      const REDIRECT_URL = "windows.html";

      const folderInput = document.getElementById("folderName");
      const folderItem = document.getElementById("folderItem");
      let actualWord = "";

      function wiggleFolder() {
        folderItem.classList.remove("is-wiggle");
        void folderItem.offsetWidth;
        folderItem.classList.add("is-wiggle");
      }

      folderInput.addEventListener("keydown", function (event) {
        if (event.key !== "Enter") {
          return;
        }

        event.preventDefault();
        const typedWord = folderInput.value.trim();

        if (!typedWord) {
          return;
        }

        const normalizedWord = typedWord.toLowerCase();

        if (normalizedWord !== actualWord) {
          actualWord = normalizedWord;
          folderInput.value = "";
          wiggleFolder();
          return;
        }

        folderInput.value = "";
        window.location.assign(REDIRECT_URL);
      });
    </script>
  </body>
</html>

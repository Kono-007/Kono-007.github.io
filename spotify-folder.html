<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Folder</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #5bbf8e 0%, #1d7d57 55%, #0f4c35 100%);
        color: #e7fff3;
      }

      main {
        width: min(92vw, 540px);
        padding: 1.3rem;
        border-radius: 12px;
        background: rgba(11, 44, 30, 0.62);
        border: 1px solid rgba(163, 238, 198, 0.25);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      img {
        width: 34px;
        height: 34px;
      }

      a {
        color: #adffd2;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="row">
        <img src="Source/spotify2.ico" alt="" aria-hidden="true" />
        <h1>Spotify Folder</h1>
      </div>
      <p>This is a basic placeholder page for the Spotify folder.</p>
      <p><a href="index.html">Back to index</a></p>
    </main>
  </body>
</html>
